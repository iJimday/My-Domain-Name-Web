<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- 背景透明 -->
  <rect width="200" height="200" fill="transparent"/>
  
  <!-- emoji图标 - 使用外层group确保精确居中 -->
  <g transform="translate(100, 100)">
    <text x="0" y="0" font-size="160" font-family="apple color emoji, segoe ui emoji, noto color emoji, sans-serif" text-anchor="middle" dominant-baseline="central" alignment-baseline="central" style="paint-order: stroke;">🥬</text>
  </g>
</svg>
